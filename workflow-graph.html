<h1>Hiero Consensus Node — GitHub Workflow Dependencies</h1>
<div id="legend">

<div id="wrapper">

    <div id="sb-body" style="display:none">

        <div class="sb-concurrency" id="sb-concurrency"></div>
      </div>
      <div class="sb-section" id="sb-calls-section">

        <ul class="sb-dep-list" id="sb-calls-list"></ul>
      </div>
      <div class="sb-section" id="sb-calledby-section">
        <div class="sb-section-title">Called by <span class="sb-count" id="sb-calledby-count"></span></div>
        <ul class="sb-dep-list" id="sb-calledby-list"></ul>
      </div>
      <div class="sb-section" id="sb-jobs-section">
        <div class="sb-section-title">Jobs <span class="sb-count" id="sb-jobs-count"></span></div>
        <div id="sb-jobs-list"></div>
      </div>
      <div class="sb-section" id="sb-inputs-section">
        <div class="sb-section-title">Inputs <span class="sb-count" id="sb-inputs-count"></span></div>
        <div id="sb-inputs-list"></div>
      </div>
    </div>
  </div>
</div>
<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-trigger" id="tt-trigger"></div>
</div>

// Add zoom controls after vis.js init (vis.js clears container innerHTML on init)
const zoomEl = document.createElement('div');

zoomEl.innerHTML = '<button id="btn-zoom-in" title="Zoom in">+</button><button id="btn-zoom-out" title="Zoom out">−</button>';
container.appendChild(zoomEl);

// Two-finger scroll → pan; pinch (ctrlKey) → zoom
container.addEventListener('wheel', function(e) {
  e.preventDefault();
  if (e.ctrlKey) {
    const newScale = Math.min(3, Math.max(0.1, network.getScale() * (1 - e.deltaY * 0.005)));
    network.moveTo({ scale: newScale, animation: false });
  } else {
    const scale = network.getScale();
    const vp = network.getViewPosition();
    network.moveTo({
      position: { x: vp.x - e.deltaX / scale, y: vp.y - e.deltaY / scale },
      animation: false,
    });
  }
}, { passive: false });

  // History tracking
  if (!skipHistory && _currentNode !== null && _currentNode !== nodeId) {
    _navHistory.push(_currentNode);
  }
  _currentNode = nodeId;
  const backBtn = document.getElementById('sb-back');
  backBtn.style.display = _navHistory.length > 0 ? 'inline' : 'none';

  // Show header + body, hide empty state
  document.getElementById('sb-empty-state').style.display = 'none';
  document.getElementById('sb-header').style.display = '';
  document.getElementById('sb-body').style.display = '';

  const node = nodes.get(nodeId);
  const meta = workflowMeta[nodeId] || {};
  const c = groupColors[node.group];

  document.getElementById('sb-title').textContent = meta.name || nodeId;
  const badge = document.getElementById('sb-badge');
  badge.textContent = groupLabels[node.group] || node.group;
  badge.style.cssText = `background:${c.bg};color:${c.font};border:1px solid ${c.border}`;

  document.getElementById('sb-file').textContent = nodeId + '.yaml';

  // Triggers
  const triggers = meta.triggers || [node.trigger];
  document.getElementById('sb-triggers').innerHTML = triggers.map(t =>
    `<span class="sb-trigger-tag">${t}</span>`).join('');
  const detail = meta.triggerDetail || '';
  const detailEl = document.getElementById('sb-trigger-detail');
  detailEl.textContent = detail;
  detailEl.style.display = detail ? '' : 'none';

  // Concurrency
  const concSection = document.getElementById('sb-concurrency-section');
  if (meta.concurrency) {
    document.getElementById('sb-concurrency').innerHTML =
      escHtml(meta.concurrency) +
      (meta.cancelInProgress ? '<span class="sb-cancel-badge">cancel-in-progress</span>' : '');
    concSection.style.display = '';
  } else {
    concSection.style.display = 'none';
  }

  // Calls (outgoing)
  const outgoing = edges.filter(e => e.from === nodeId);
  const callsList = document.getElementById('sb-calls-list');
  document.getElementById('sb-calls-count').textContent = `(${outgoing.length})`;
  if (outgoing.length) {
    callsList.innerHTML = outgoing.map(e => {
      const target = nodes.get(e.to);
      const tc = groupColors[target ? target.group : 'leaf'];
      const label = (workflowMeta[e.to] || {}).name || e.to;
      return `<li>
        <span class="sb-dep-link" data-node="${escAttr(e.to)}">${escHtml(label)}</span>
        <span class="sb-dep-badge" style="background:${tc.bg};color:${tc.font};border-color:${tc.border}">${escHtml(groupLabels[target ? target.group : 'leaf'] || '')}</span>
      </li>`;
    }).join('');
    document.getElementById('sb-calls-section').style.display = '';
  } else {
    callsList.innerHTML = '<li class="sb-empty">none</li>';
    document.getElementById('sb-calls-section').style.display = '';
  }

  // Called by (incoming)
  const incoming = edges.filter(e => e.to === nodeId);
  const calledByList = document.getElementById('sb-calledby-list');
  document.getElementById('sb-calledby-count').textContent = `(${incoming.length})`;
  if (incoming.length) {
    calledByList.innerHTML = incoming.map(e => {
      const src = nodes.get(e.from);
      const sc = groupColors[src ? src.group : 'manual'];
      const label = (workflowMeta[e.from] || {}).name || e.from;
      return `<li>
        <span class="sb-dep-link" data-node="${escAttr(e.from)}">${escHtml(label)}</span>
        <span class="sb-dep-badge" style="background:${sc.bg};color:${sc.font};border-color:${sc.border}">${escHtml(groupLabels[src ? src.group : 'manual'] || '')}</span>
      </li>`;
    }).join('');
    document.getElementById('sb-calledby-section').style.display = '';
  } else {
    calledByList.innerHTML = '<li class="sb-empty">none</li>';
    document.getElementById('sb-calledby-section').style.display = '';
  }

  // Jobs
  const jobs = meta.jobs || [];
  document.getElementById('sb-jobs-count').textContent = `(${jobs.length})`;
  document.getElementById('sb-jobs-list').innerHTML = jobs.map(j => {
    const isReusable = j.runner === 'reusable';
    return `<div class="sb-job-row">
      <span class="sb-job-name">${escHtml(j.name)}</span>
      <span class="sb-job-runner${isReusable ? ' reusable' : ''}">${isReusable ? 'reusable' : escHtml(j.runner)}</span>
    </div>`;
  }).join('') || '<div class="sb-empty">no jobs found</div>';

  // Inputs
  const inputsSection = document.getElementById('sb-inputs-section');
  const inputs = meta.inputs || [];
  if (inputs.length) {
    document.getElementById('sb-inputs-count').textContent = `(${inputs.length})`;
    document.getElementById('sb-inputs-list').innerHTML = inputs.map(inp => {
      const req = inp.required ? '<span class="sb-req-badge">req</span>' : '';
      const def = inp.default != null ? `"${escHtml(String(inp.default))}"` : '—';
      return `<div class="sb-input-row">
        <span class="sb-input-name">${escHtml(inp.name)}${req}</span>
        <span class="sb-input-type">${escHtml(inp.type)}</span>
        <span class="sb-input-default">${def}</span>
      </div>`;
    }).join('');
    inputsSection.style.display = '';
  } else {
    inputsSection.style.display = 'none';
  }

  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sb-body').scrollTop = 0;
}

function closeSidebar() {
  _navHistory = [];
  _currentNode = null;
  document.getElementById('sb-empty-state').style.display = '';
  document.getElementById('sb-header').style.display = 'none';
  document.getElementById('sb-body').style.display = 'none';
}

function closeSidebarAndDeselect() {
  closeSidebar();
  network.unselectAll();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }

// Back button
document.getElementById('sb-back').addEventListener('click', () => {
  if (!_navHistory.length) return;
  const prevId = _navHistory.pop();
  network.selectNodes([prevId]);
  network.focus(prevId, { scale: network.getScale(), animation: { duration: 300, easingFunction: 'easeInOutQuad' } });
  openSidebar(prevId, true); // skipHistory=true so we don't re-push
});

// Zoom buttons
const ZOOM_FACTOR = 1.35;
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  network.moveTo({ scale: Math.min(3, network.getScale() * ZOOM_FACTOR), animation: { duration: 200, easingFunction: 'easeInOutQuad' } });
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  network.moveTo({ scale: Math.max(0.1, network.getScale() / ZOOM_FACTOR), animation: { duration: 200, easingFunction: 'easeInOutQuad' } });
});

// Reset view button
document.getElementById('btn-reset').addEventListener('click', () => {
  const filterEl = document.getElementById('filter');
  filterEl.value = '';
  filterEl.dispatchEvent(new Event('input'));
  const groupEl = document.getElementById('groupFilter');
  groupEl.value = 'all';
  groupEl.dispatchEvent(new Event('change'));
  network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
});

// Fit graph and populate empty-state stats on first render
network.once('afterDrawing', () => {
  network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
  document.getElementById('es-stats').textContent =
    `${workflows.length} workflows · ${edges.length} edges`;
});

// Navigate to node when clicking dep links in sidebar
document.getElementById('sb-body').addEventListener('click', function(e) {
  const link = e.target.closest('.sb-dep-link');
  if (!link) return;
  const targetId = link.dataset.node;
  if (!targetId) return;
  network.selectNodes([targetId]);
  network.focus(targetId, { scale: network.getScale(), animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
  openSidebar(targetId);
});

// Highlight target node in graph on dep-link hover
let _hoverHighlightId = null;
let _hoverOrig = null;
function _restoreHoverHighlight() {
  if (_hoverHighlightId && _hoverOrig) {
    nodes.update({ id: _hoverHighlightId, color: _hoverOrig.color, borderWidth: _hoverOrig.borderWidth, shadow: _hoverOrig.shadow });
    _hoverHighlightId = null;
    _hoverOrig = null;
  }
}
document.getElementById('sb-body').addEventListener('mouseover', function(e) {
  const link = e.target.closest('.sb-dep-link');
  if (!link) return;
  const targetId = link.dataset.node;
  if (!targetId || targetId === _hoverHighlightId) return;
  _restoreHoverHighlight();
  const node = nodes.get(targetId);
  if (!node) return;
  _hoverHighlightId = targetId;
  _hoverOrig = { color: node.color, borderWidth: node.borderWidth, shadow: node.shadow };
  nodes.update({ id: targetId, color: { background: '#ff9f1c', border: '#c1440e', highlight: { background: '#ff9f1c', border: '#c1440e' } }, borderWidth: 3.5, shadow: { enabled: true, color: 'rgba(200,60,0,0.55)', size: 14, x: 0, y: 0 } });
});
document.getElementById('sb-body').addEventListener('mouseout', function(e) {
  const link = e.target.closest('.sb-dep-link');
  if (!link) return;
  _restoreHoverHighlight();
});

document.getElementById('sb-close').addEventListener('click', closeSidebarAndDeselect);

// Debounce deselect so switching nodes (deselect → select in same click)
// doesn't flash-close the sidebar before the new selectNode fires.
let _closeTimer = null;
network.on('selectNode', params => {
  clearTimeout(_closeTimer);
  if (params.nodes.length) openSidebar(params.nodes[0]);
});
network.on('deselectNode', () => {
  _closeTimer = setTimeout(() => closeSidebar(), 80);
});

// Tooltip (hover)
const tooltip = document.getElementById("tooltip");
network.on("hoverNode", function(params) {
  const node = nodes.get(params.node);
  document.getElementById("tt-name").textContent = params.node;
  document.getElementById("tt-trigger").textContent = "Trigger: " + node.trigger;
  tooltip.style.display = "block";
});
network.on("blurNode", () => { tooltip.style.display = "none"; });

// Track mouse position with a native listener — vis.js mouseMove only fires over nodes
container.addEventListener("mousemove", e => {
  tooltip.style.left = (e.clientX + 16) + "px";
  tooltip.style.top  = (e.clientY + 16) + "px";
});

// Filter
document.getElementById("filter").addEventListener("input", function() {
  const q = this.value.toLowerCase();
  nodes.forEach(n => {
    const visible = !q || n.id.toLowerCase().includes(q) || n.label.toLowerCase().includes(q);
    nodes.update({ id: n.id, hidden: !visible });
  });
});

// Group filter
document.getElementById("groupFilter").addEventListener("change", function() {
  const groups = {
    all: null,
    mats: ["zxc-mats-tests","zxc-compile-and-spotless-check","zxc-dependency-module-check","zxc-execute-unit-tests","zxc-execute-integration-tests","zxc-execute-hapi-tests","zxc-execute-otter-tests","zxc-snyk-scan","zxc-verify-gradle-build-determinism","zxc-verify-docker-build-determinism","node-flow-pull-request-checks","node-flow-build-application","flow-dry-run-mats-suite","210-flow-merge-queue-controller"],
    xts: ["zxc-xts-tests","zxc-compile-and-spotless-check","zxc-execute-timing-sensitive-tests","zxc-execute-hammer-tests","zxc-execute-hapi-tests","zxc-execute-otter-tests","zxc-block-node-regression","zxc-jrs-regression","zxc-json-rpc-relay-regression","zxc-mirror-node-regression","zxc-tck-regression","flow-dry-run-extended-test-suite","zxcron-extended-test-suite","210-flow-merge-queue-controller"],
    release: ["node-flow-deploy-release-artifact","node-flow-deploy-adhoc-artifact","flow-trigger-release","flow-generate-release-notes","node-zxc-build-release-artifact","zxc-create-github-release","zxc-publish-production-image"],
    perf: ["zxf-single-day-performance-test-controller","zxf-single-day-performance-test-controller-adhoc","zxc-single-day-performance-test","zxc-execute-performance-test","zxf-single-day-longevity-test-controller","zxf-single-day-longevity-test-controller-adhoc","zxc-single-day-longevity-test","zxf-merge-queue-performance-test-controller","zxf-merge-queue-performance-test-controller-adhoc","zxc-merge-queue-performance-test","801-read-chewie-response","210-flow-merge-queue-controller"],
  };
  const selected = groups[this.value];
  nodes.forEach(n => {
    nodes.update({ id: n.id, hidden: selected ? !selected.includes(n.id) : false });
  });
});
</script>
</body>
</html>
