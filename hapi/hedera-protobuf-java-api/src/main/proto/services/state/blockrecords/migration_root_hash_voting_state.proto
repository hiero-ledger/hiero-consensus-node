syntax = "proto3";

package com.hedera.hapi.node.state.blockrecords;

// SPDX-License-Identifier: Apache-2.0
option java_package = "com.hederahashgraph.api.proto.java";
// <<<pbj.java_package = "com.hedera.hapi.node.state.blockrecords">>> This comment is special code for setting PBJ Compiler java package
option java_multiple_files = true;

/**
 * Singleton state for startup migration vote progress/finalization.
 */
message MigrationRootHashVotingState {
  /**
   * Whether a vote payload has exceeded the >1/3 threshold and been applied.
   */
  bool voting_complete = 1;

  /**
   * Block-number deadline for migration voting queueing.
   * While current block number is less than this value, queueing remains enabled.
   */
  uint64 voting_completion_deadline_block_number = 2;
}
