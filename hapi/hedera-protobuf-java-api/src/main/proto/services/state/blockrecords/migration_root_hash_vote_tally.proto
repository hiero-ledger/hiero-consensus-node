syntax = "proto3";

package com.hedera.hapi.node.state.blockrecords;

// SPDX-License-Identifier: Apache-2.0
option java_package = "com.hederahashgraph.api.proto.java";
// <<<pbj.java_package = "com.hedera.hapi.node.state.blockrecords">>> This comment is special code for setting PBJ Compiler java package
option java_multiple_files = true;

/**
 * Aggregated vote information for a single migration vote payload.
 */
message MigrationRootHashVoteTally {
  /**
   * Total source-roster weight that has voted for this payload.
   */
  uint64 total_weight = 1;
}
