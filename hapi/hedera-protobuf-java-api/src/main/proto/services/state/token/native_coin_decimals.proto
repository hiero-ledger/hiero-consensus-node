/**
 * # Native Coin Decimals
 * Singleton state that persists the decimal precision of the native coin
 * as configured at genesis. This value is immutable after genesis.
 *
 * ### Keywords
 * The key words "MUST", "MUST NOT", "REQUIRED", "SHALL", "SHALL NOT",
 * "SHOULD", "SHOULD NOT", "RECOMMENDED", "MAY", and "OPTIONAL" in this
 * document are to be interpreted as described in [RFC2119](https://www.ietf.org/rfc/rfc2119)
 * and clarified in [RFC8174](https://www.ietf.org/rfc/rfc8174).
 */
syntax = "proto3";

package com.hedera.hapi.node.state.token;

// SPDX-License-Identifier: Apache-2.0
option java_package = "com.hedera.hapi.node.state.token.legacy";
// <<<pbj.java_package = "com.hedera.hapi.node.state.token">>> This comment is special code for setting PBJ Compiler java package
option java_multiple_files = true;

/**
 * A singleton state object that stores the native coin decimal precision
 * as established at genesis. Once set, this value SHALL NOT change.
 */
message NativeCoinDecimals {
  /**
   * The number of decimal places for the native coin (e.g., 8 means 1 HBAR = 10^8 tinybars).
   * This value MUST be between 0 and 18 inclusive.
   */
  int32 decimals = 1;
}
