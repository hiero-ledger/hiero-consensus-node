# Override Solo's root-container image with our NMT-baked variant. Pulled in
# via `solo consensus network deploy --values-file <this>` from solo-migration-
# test.sh. The image is tagged locally and side-loaded into kind, so
# pullPolicy=Never is required (no registry).
#
# Key path: the chart's network-node-statefulset.yaml computes the root image
# via:
#   $rootImage := ($node.root).image | default $.Values.defaults.root.image
# i.e. `defaults.root.image` is the chart-wide default, applied to every node
# that doesn't set its own `hedera.nodes[].root.image`. We override the
# default since all three migration-test nodes use the same image.
#
# Issue: hiero-ledger/hiero-consensus-node#25736
defaults:
  root:
    image:
      registry: "localhost"
      repository: "solo-nmt-network-node"
      tag: "v1.3.4-jdk25"
      pullPolicy: "Never"
