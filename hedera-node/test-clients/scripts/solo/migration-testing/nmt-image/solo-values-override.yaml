# Helm values override pulled in via `solo consensus network deploy
# --values-file <this>` from solo-migration-test.sh.
#
# Why only `pullPolicy` is here:
#
# Solo CLI's addRootImageValues() (see node_modules/@hashgraph/solo/dist/src/
# core/helpers.js) injects per-node image refs via helm `--set`:
#   --set hedera.nodes[N].root.image.registry=<X>
#   --set hedera.nodes[N].root.image.repository=<Y>
#   --set hedera.nodes[N].root.image.tag=<Z>
# Helm `--set` beats `--values-file`, so any registry/repository/tag we put
# here would be silently shadowed. The script overrides those three knobs
# with SOLO_S6_NODE_IMAGE_{REGISTRY,REPOSITORY,VERSION} env vars (consumed
# inside Solo CLI before the --set is built).
#
# `pullPolicy` is *not* set by Solo CLI, so values-file wins for that one
# key — and we need pullPolicy=Never because the image is side-loaded into
# kind, not pulled from a registry.
#
# Issue: hiero-ledger/hiero-consensus-node#25736
defaults:
  root:
    image:
      pullPolicy: "Never"
