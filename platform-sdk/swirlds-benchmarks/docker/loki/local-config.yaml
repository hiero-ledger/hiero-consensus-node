auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: loki
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

pattern_ingester:
  enabled: true

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  discover_log_levels: true
  reject_old_samples: false
  reject_old_samples_max_age: 168h
