# Observability stack for Swirlds Benchmarks.
# Tuneable parameters live in .env (copy/edit values to override defaults).

services:

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.3.0}
    volumes:
      - ./prometheus:/etc/prometheus:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
      - '--enable-feature=native-histograms'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - monitoring-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:12.4.0}
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_PLUGIN_ALLOW_LOCAL_MODE=true
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_INSTALL_PLUGINS=marcusolsson-csv-datasource,grafana-lokiexplore-app
      - GF_SERVER_HTTP_PORT=${GRAFANA_PORT:-3001}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - ./../data:/benchmark-data:ro
    ports:
      - "${GRAFANA_PORT:-3001}:${GRAFANA_PORT:-3001}"
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring-network

  # ── Loki ─────────────────────────────────────────────────────────────────────
  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.6.7}
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki:/etc/loki:ro
    networks:
      - monitoring-network

  # ── Alloy (log collector) ─────────────────────────────────────────────────────
  alloy:
    image: ${ALLOY_IMAGE:-grafana/alloy:v1.11.3}
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ${LOGS_PATH:-../output}:/var/log/benchmarks:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    ports:
      - "${ALLOY_UI_PORT:-12345}:12345"
    depends_on:
      - loki
    networks:
      - monitoring-network

networks:
  monitoring-network:
    driver: bridge