replicas: 1

resources:
  requests:
  limits:
    cpu: 8
    memory: 54Gi
  requests:
    cpu: 8
    memory: 54Gi

nodeSelector:
  #solo.hashgraph.io/role: "auxiliary-services"consensus-node
  solo.hashgraph.io/role: "consensus-node"
  solo.hashgraph.io/owner: "%NETWORK_OWNER%"
  solo.hashgraph.io/network-id: "%NETWORK_ID%"
tolerations:
  - key: "solo.hashgraph.io/role"
    operator: "Equal"
    #value: "auxiliary-services"
    value: "consensus-node"
    effect: "NoSchedule"
  - key: "solo.hashgraph.io/owner"
    operator: "Equal"
    value: "%NETWORK_OWNER%"
    effect: "NoSchedule"
  - key: "solo.hashgraph.io/network-id"
    operator: "Equal"
    value: "%NETWORK_ID%"
    effect: "NoSchedule"

image:
  repository: ghcr.io/hiero-ledger/hiero-block-node-solo-dev

plugins:
  repositories:
    - id: besu-maven
      url: https://artifacts.hashgraph.io/artifactory/hyperledger-besu-maven-external/

blockNode:
  # if blank will use same as AppVersion of chart.
  version: ""
  config:
    #BLOCK_NODE_EARLIEST_MANAGED_BLOCK: "1000"
    JAVA_OPTS: '-Xms48G -Xmx52G -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath="/tmp/dump.hprof"'
  persistence:
    archive:
      create: false
      # name of the volume within the statefulset
      volumeName: "archive-storage"
      # Name of the subPath in the volume to mount to mountPath in the container
      subPath: "archive-data"
      # should match PERSISTENCE_STORAGE_ARCHIVE_ROOT_PATH, leave as is for default.
      mountPath: "/opt/hiero/block-node/data/historic"
      size: 800Gi
      # Optionally add a storage class name if needed
      storageClass: "local-path"
      # Optionally specify an existing PVC name instead of creating via volumeClaimTemplate
      existingClaim: "archive-storage-block-node-%NODE_ID%-0"
    logging:
      create: false
      # name of the volume within the statefulset
      volumeName: "logging-storage"
      mountPath: "/opt/hiero/block-node/logs"
      size: 2Gi
      # Optionally add a storage class name if needed
      storageClass: "local-path"
      # Optionally specify an existing PVC name instead of creating via volumeClaimTemplate
      existingClaim: "logging-storage-block-node-%NODE_ID%-0"
    live:
      create: false
      # name of the volume within the statefulset
      volumeName: "live-storage"
      # Name of the subPath in the volume to mount to mountPath in the container
      subPath: "live-data"
      # should match PERSISTENCE_STORAGE_LIVE_ROOT_PATH, leave as is for default.
      mountPath: "/opt/hiero/block-node/data/live"
      size: 20Gi
      # Optionally add a storage class name if needed
      storageClass: "local-path"
      # Optionally specify an existing PVC name instead of creating via volumeClaimTemplate
      existingClaim: "live-storage-block-node-%NODE_ID%-0"
    verification:
      create: false
      # name of the volume within the statefulset
      volumeName: "verification-storage"
      # should match VERIFICATION_ALL_BLOCKS_HASHER_FILE_PATH parent directory
      mountPath: "/opt/hiero/block-node/verification"
      size: 1Gi
      # Optionally add a storage class name if needed
      storageClass: "local-path"
      # Optionally specify an existing PVC name instead of creating via volumeClaimTemplate
      existingClaim: "verification-storage-block-node-%NODE_ID%-0"
    plugins:
      create: false
      # name of the volume within the statefulset
      volumeName: "plugins-storage"
      size: 1Gi
      # Optionally add a storage class name if needed
      # storageClass: "your-storage-class"
      # Optionally specify an existing PVC name instead of creating via volumeClaimTemplate
      existingClaim: "plugins-storage-block-node-%NODE_ID%-0"

  logs:
    # Available Levels are (from most verbose to least verbose):
    # ALL FINEST FINER FINE CONFIG INFO WARNING SEVERE OFF
    level: "INFO"
    configMountPath: "/opt/hiero/block-node/logs/config"
    loggingProperties:
      org.hiero.block.level: "FINEST"
      io.helidon.webserver.level: "INFO"
      io.helidon.webserver.access.level: "INFO"
      io.helidon.config.level: "SEVERE"
      io.helidon.security.level: "INFO"
      io.helidon.common.level: "INFO"
      handlers: "java.util.logging.ConsoleHandler, java.util.logging.FileHandler"
      java.util.logging.ConsoleHandler.level: "FINE"
      java.util.logging.ConsoleHandler.formatter: "java.util.logging.SimpleFormatter"
      java.util.logging.FileHandler.pattern: "/opt/hiero/block-node/logs/blocknode.log"
      java.util.logging.FileHandler.append: "true"
      java.util.logging.FileHandler.limit: "0"
      java.util.logging.FileHandler.count: "1"
      java.util.logging.FileHandler.level: "FINE"
      java.util.logging.FileHandler.formatter: "java.util.logging.SimpleFormatter"
      ################################################################################
      # SimpleFormatter single-line format configuration
      ################################################################################
      # The format syntax uses java.util.Formatter.
      # The parameters are:
      #   %1$ - date/time (java.util.Date)
      #   %2$ - source (usually class and method)
      #   %3$ - logger?s name
      #   %4$ - log level
      #   %5$ - log message
      #   %6$ - throwable trace
      java.util.logging.SimpleFormatter.format: "%TF %<TT.%<TL%<Tz %4$-7s [%2$s] %5$s%6$s%n"
      io.helidon.level: "INFO"
      com.sun.net.httpserver.level: "WARNING"
      com.sun.net.httpserver.ServerImpl.level: "WARNING"
      com.sun.net.httpserver.ExchangeImpl.level: "WARNING"