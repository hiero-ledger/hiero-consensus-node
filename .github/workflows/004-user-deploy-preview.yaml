# SPDX-License-Identifier: Apache-2.0
name: "004: [USER] Deploy Preview"
on:
  workflow_dispatch:
    inputs:
      tag-to-deploy:
        description: "Version/Tag to Deploy (eg: v0.41.0 or 0.41.1):"
        type: string
        required: true
      dry-run-enabled:
        description: "Perform Dry Run"
        type: boolean
        required: false
        default: false
      reset-enabled:
        description: "Reset the network (instead of upgrade) on a major/minor version change"
        type: boolean
        required: false
        default: false

defaults:
  run:
    shell: bash

permissions:
  contents: read
  id-token: write

jobs:
  prepare-deploy-preview:
    name: Prepare for Deploy
    runs-on: hl-cn-default-lin-sm
    outputs:
      version: ${{ steps.tag.outputs.version }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - name: Prepare Runner
        uses: pandaswhocode/initialize-github-job@05fe2fa999e509c966283d5c5cf60df69f2049e9 # v1.2.1
        with:
          setup-semver: "true"

      - name: Extract Tag Version
        id: tag
        env:
          TAG_TO_DEPLOY: ${{ github.event.inputs.tag-to-deploy }}
        run: |
          RELEASE_VERSION="$(semver get release "${TAG_TO_DEPLOY}")"
          PRERELEASE_VERSION="$(semver get prerel "${TAG_TO_DEPLOY}")"

          FINAL_VERSION="${RELEASE_VERSION}"
          PRERELEASE_FLAG="false"
          [[ -n "${PRERELEASE_VERSION}" ]] && FINAL_VERSION="${RELEASE_VERSION}-${PRERELEASE_VERSION}"
          [[ -n "${PRERELEASE_VERSION}" ]] && PRERELEASE_FLAG="true"

          echo "version=${FINAL_VERSION}" >>"${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE_FLAG}" >>"${GITHUB_OUTPUT}"

  deploy-tag:
    name: Deploy Tag
    uses: ./.github/workflows/851-call-deploy-preview.yaml
    needs:
      - prepare-deploy-preview
    with:
      version-policy: specified
      new-version: ${{ needs.prepare-deploy-preview.outputs.version }}
      dry-run-enabled: ${{ github.event.inputs.dry-run-enabled == 'true' }}
      reset-enabled: ${{ github.event.inputs.reset-enabled == 'true' }}
    secrets:
      access-token: ${{ secrets.GITHUB_TOKEN }}
      bucket-name: ${{ secrets.RELEASE_ARTIFACT_BUCKET_NAME }}
      jenkins-preview-url: ${{ secrets.RELEASE_JENKINS_PREVIEW_URL }}
