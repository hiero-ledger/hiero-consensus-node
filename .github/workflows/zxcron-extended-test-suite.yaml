# SPDX-License-Identifier: Apache-2.0
name: "ZXCron: [CITR] Extended Test Suite"
on:
  workflow_dispatch:
    inputs:
      rc-tag:
        required: false
        description: "Release Candidate Tag:"
        type: string
        default: ""
      enable-promotion:
        required: false
        description: "Tag with epoch timestamp (enables promotion)"
        default: false
        type: boolean
      test-mock-category:
        description: "TEMP: Mock category (test, infrastructure, cancelled)"
        type: string
        default: "test"
  # TEMP: Disabled for mock testing
  # schedule:
  #   # Runs Extended Test Suite every three hours Monday to Friday
  #   - cron: "0 */3 * * *"

permissions:
  id-token: write
  actions: write
  pull-requests: write
  statuses: write
  checks: write
  contents: read

defaults:
  run:
    shell: bash

env:
  XTS_CANDIDATE_TAG: "xts-candidate"
  XTS_PASS_GREP_PATTERN: "xts-pass-*"
  PROMOTED_GREP_PATTERN: "build-.{5}"
  BUILD_GREP_PATTERN: "build-*"

jobs:
  # TEMP: Commented out for mock testing
  # parameters:
  #   name: Determine Configurable Parameters
  #   runs-on: hl-cn-default-lin-sm
  #   outputs:
  #     solo-ge-0440: ${{ steps.set-parameters.outputs.solo-ge-0440 }}
  #     solo-version: ${{ steps.set-parameters.outputs.solo-version }}
  #     helm-release-name: ${{ steps.set-parameters.outputs.helm-release-name }}
  #   steps:
  #     - name: Initialize GitHub Job
  #       uses: pandaswhocode/initialize-github-job@bfe0b1633012cee3033c757c7095d49c360e23a6 # v1.0.1
  #
  #     - name: Set Parameters
  #       id: set-parameters
  #       run: |
  #         SOLO_GE_0440=$([[ "$(printf '%s\n' "${{vars.CITR_SOLO_VERSION}}" "v0.44.0" | sort -V | head -n1)" == "v0.44.0" ]] && echo "true" || echo "false")
  #         HELM_NAME="mirror"
  #         if [[ "${SOLO_GE_0440}" == "true" ]]; then
  #           HELM_NAME="mirror-1"
  #         fi
  #
  #         echo "::debug::SOLO_GE_0440=${SOLO_GE_0440}"
  #         echo "helm-release-name=${HELM_NAME}" >> "${GITHUB_OUTPUT}"
  #         echo "solo-ge-0440=${SOLO_GE_0440}" >> "${GITHUB_OUTPUT}"
  #         echo "solo-version=${{ vars.CITR_SOLO_VERSION }}" >> "${GITHUB_OUTPUT}"

  # TEMP: Mock version of fetch-xts-candidate
  fetch-xts-candidate:
    name: Fetch XTS Candidate Tag (MOCK)
    runs-on: hl-cn-default-lin-sm
    outputs:
      xts-tag-exists: ${{ steps.mock-outputs.outputs.xts-tag-exists }}
      xts-tag-commit: ${{ steps.mock-outputs.outputs.xts-tag-commit }}
      xts-tag-short-commit: ${{ steps.mock-outputs.outputs.xts-tag-short-commit }}
      xts-commit-branch: ${{ steps.mock-outputs.outputs.xts-commit-branch }}
      xts-tag-commit-author: ${{ steps.mock-outputs.outputs.xts-tag-commit-author }}
      xts-tag-commit-email: ${{ steps.mock-outputs.outputs.xts-tag-commit-email }}
      xts-info: ${{ steps.mock-outputs.outputs.xts-info }}
      commit-list: ${{ steps.mock-outputs.outputs.commit-list }}
    steps:
      - name: Set Mock Outputs
        id: mock-outputs
        run: |
          echo "xts-tag-exists=true" >> "${GITHUB_OUTPUT}"
          echo "xts-tag-commit=abc1234567890abcdef1234567890abcdef123456" >> "${GITHUB_OUTPUT}"
          echo "xts-tag-short-commit=abc1234" >> "${GITHUB_OUTPUT}"
          echo "xts-commit-branch=main" >> "${GITHUB_OUTPUT}"
          echo "xts-tag-commit-author=Mock Author <mock@example.com>" >> "${GITHUB_OUTPUT}"
          echo "xts-tag-commit-email=mock@example.com" >> "${GITHUB_OUTPUT}"
          echo "xts-info=main - abc1234 (mock)" >> "${GITHUB_OUTPUT}"
          echo "commit-list=- [abc1234: mock commit message](https://github.com/${{ github.repository }}/commit/abc1234567890abcdef1234567890abcdef123456)" >> "${GITHUB_OUTPUT}"

  # TEMP: Commented out for mock testing
  # state-validator-uberjar:
  #   name: Build & Publish Hedera State Validator Uber JAR
  #   needs:
  #     - fetch-xts-candidate
  #   if: ${{ needs.fetch-xts-candidate.result == 'success' && needs.fetch-xts-candidate.outputs.xts-tag-exists == 'true' }}
  #   uses: ./.github/workflows/zxc-build-publish-state-validator.yaml
  #   with:
  #     ref: ${{ needs.fetch-xts-candidate.outputs.xts-tag-commit }}

  # TEMP: Mock version of xts-execution
  xts-execution:
    name: Execute XTS (MOCK)
    runs-on: hl-cn-default-lin-sm
    needs:
      - fetch-xts-candidate
    outputs:
      failure-mode: ${{ steps.mock-outputs.outputs.failure-mode }}
      failed-tests: ${{ steps.mock-outputs.outputs.failed-tests }}
    steps:
      - name: Set Mock Outputs
        id: mock-outputs
        env:
          MOCK_CATEGORY: ${{ inputs.test-mock-category || 'test' }}
        run: |
          if [[ "${MOCK_CATEGORY}" == "test" ]]; then
            echo "failure-mode=test" >> "${GITHUB_OUTPUT}"
            echo "failed-tests=HAPI Tests (Misc), Otter Tests (Fast)" >> "${GITHUB_OUTPUT}"
          elif [[ "${MOCK_CATEGORY}" == "infrastructure" ]]; then
            echo "failure-mode=workflow" >> "${GITHUB_OUTPUT}"
            echo "failed-tests=" >> "${GITHUB_OUTPUT}"
          elif [[ "${MOCK_CATEGORY}" == "cancelled" ]]; then
            echo "failure-mode=cancelled" >> "${GITHUB_OUTPUT}"
            echo "failed-tests=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Simulate Failure
        env:
          MOCK_CATEGORY: ${{ inputs.test-mock-category || 'test' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${MOCK_CATEGORY}" == "test" || "${MOCK_CATEGORY}" == "infrastructure" ]]; then
            echo "Simulating ${MOCK_CATEGORY} failure..."
            exit 1
          elif [[ "${MOCK_CATEGORY}" == "cancelled" ]]; then
            echo "Simulating cancellation..."
            gh run cancel ${{ github.run_id }}
            sleep 60
          fi

  # TEMP: Commented out for mock testing
  # xts-optional-execution:
  #   name: Execute Optional XTS Tests
  #   needs:
  #     - fetch-xts-candidate
  #     - parameters
  #     - state-validator-uberjar
  #   if: ${{ needs.fetch-xts-candidate.result == 'success' && needs.fetch-xts-candidate.outputs.xts-tag-exists == 'true' }}
  #   uses: ./.github/workflows/zxc-xts-tests.yaml
  #   with:
  #     ref: ${{ needs.fetch-xts-candidate.outputs.xts-tag-commit }}
  #     branch_name: ${{ needs.fetch-xts-candidate.outputs.xts-commit-branch }}
  #     solo-version: ${{ needs.parameters.outputs.solo-version }}
  #     solo-ge-0440: ${{ needs.parameters.outputs.solo-ge-0440 }}
  #     helm-release-name: ${{ needs.parameters.outputs.helm-release-name }}
  #     mirror-node-version: ${{ vars.CITR_MIRROR_NODE_VERSION }}
  #     custom-job-label: "XTS (Optional):"
  #     enable-mirror-node-regression-panel: "true"
  #     enable-rpc-relay-regression-panel: "true"
  #     enable-block-node-regression-panel: "true"
  #     enable-chaos-otter-test-suite: "true"
  #   secrets:
  #     access-token: ${{ secrets.GH_ACCESS_TOKEN }}
  #     slack-citr-details-token: ${{ secrets.SLACK_CITR_DETAILED_REPORTS_WEBHOOK }}

  # TEMP: Mock version of tag-for-promotion
  tag-for-promotion:
    name: Tag as XTS-Passing (MOCK)
    runs-on: hl-cn-default-lin-sm
    needs:
      - fetch-xts-candidate
      - xts-execution
    if: ${{ needs.xts-execution.result == 'success' }}
    steps:
      - name: Mock Tag
        run: echo "Mock tag-for-promotion (skipped when xts-execution fails)"

  report-success:
    name: Report XTS execution success
    runs-on: hl-cn-default-lin-sm
    needs:
      - fetch-xts-candidate
      - xts-execution
      - tag-for-promotion
    if: ${{ (needs.fetch-xts-candidate.result == 'success' &&
      needs.xts-execution.result == 'success' &&
      needs.tag-for-promotion.result == 'success') &&
      !cancelled() }}
    steps:
      - name: Initialize GitHub Job
        uses: pandaswhocode/initialize-github-job@bfe0b1633012cee3033c757c7095d49c360e23a6 # v1.0.1

      - name: Report Success (slack)
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_TEST_MESSAGES_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload: |
            {
              "attachments": [
                {
                  "color": "#00FF00",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": ":tada: XTS - eXtended Test Suite Passing Report (${{ needs.fetch-xts-candidate.outputs.xts-info }}) Passed",
                        "emoji": true
                      }
                    },
                    {
                      "type": "divider"
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*XTS Job Succeeded. Test panel status below*"
                      },
                      "fields": [
                        {
                          "type": "plain_text",
                          "text": "Fetch XTS Candidate Tag: ${{ needs.fetch-xts-candidate.result }}"
                        },
                        {
                          "type": "plain_text",
                          "text": "XTS Execution: ${{ needs.xts-execution.result }}"
                        },
                        {
                          "type": "plain_text",
                          "text": "Tag as XTS-Passing: ${{ needs.tag-for-promotion.result }}"
                        }
                      ]
                    },
                    {
                      "type": "divider"
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Workflow and Commit Information*\nFor a full list of executed tests see `Workflow run URL` below"
                      },
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Source Commit*:"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.fetch-xts-candidate.outputs.xts-tag-commit }}>"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Commit author*:"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "${{ needs.fetch-xts-candidate.outputs.xts-tag-commit-author }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Workflow run ID*:"
                        },
                        {
                          "type": "mrkdwn",
                          "text": " ${{ github.run_id }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Workflow run URL*:"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                        }
                      ]
                    },
                    {
                      "type": "divider"
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Commit List*:"
                      },
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "${{ needs.fetch-xts-candidate.outputs.commit-list }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }

  report-failure:
    name: Report XTS execution failure
    runs-on: hl-cn-default-lin-sm
    needs:
      - fetch-xts-candidate
      - xts-execution
      - tag-for-promotion
    if: ${{ always() && !(
      needs.fetch-xts-candidate.result == 'success' &&
      needs.xts-execution.result == 'success' &&
      needs.tag-for-promotion.result == 'success') }}

    steps:
      - name: Initialize GitHub Job
        uses: pandaswhocode/initialize-github-job@bfe0b1633012cee3033c757c7095d49c360e23a6 # v1.0.1
        with:
          checkout: "true"
          checkout-ref: main
          checkout-fetch-depth: "0"
          checkout-token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Determine Report Category
        id: report-category
        run: |
          if [[ "${{ needs.xts-execution.result }}" == "cancelled" ]]; then
            echo "category=cancelled" >> "${GITHUB_OUTPUT}"
          elif [[ "${{ needs.fetch-xts-candidate.result }}" == "success" \
            && "${{ needs.xts-execution.result }}" == "success" \
            && "${{ needs.tag-for-promotion.result }}" == "success" ]]; then
            echo "category=success" >> "${GITHUB_OUTPUT}"
          elif [[ "${{ needs.fetch-xts-candidate.result }}" =~ ^(cancelled|failure)$ ]] \
            || [[ "${{ needs.tag-for-promotion.result }}" =~ ^(cancelled|failure)$ ]] \
            || [[ "${{ needs.xts-execution.outputs.failure-mode }}" == "workflow" ]]; then
            echo "category=infrastructure" >> "${GITHUB_OUTPUT}"
          else
            echo "category=test" >> "${GITHUB_OUTPUT}"
          fi

      - name: Collect run logs in a log file
        if: ${{ steps.report-category.outputs.category != 'cancelled' }}
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        continue-on-error: true
        run: |
          for job_id in "$(gh run view "${{ github.run_id }}" --json jobs --jq '.jobs | map(.databaseId) | .[0:-1] | .[]')"; do
            echo "Fetching logs for job $job_id..."

            current_job_name="$(gh run view ${{ github.run_id }} --json jobs | jq --argjson job_id "$job_id" -r '.jobs[] | select(.databaseId == $job_id) | .name')"

            echo "Logs for job $current_job_name :" >> run.log

            gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/hiero-ledger/hiero-consensus-node/actions/jobs/$job_id/logs >> run.log
          done

      - name: Upload log as artifact
        if: ${{ steps.report-category.outputs.category != 'cancelled' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        continue-on-error: true
        with:
          path: run.log

      - name: Find Commit Author in Slack
        id: find-commit-author-slack
        if: ${{ steps.report-category.outputs.category == 'test' }}
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_CITR_BOT_TOKEN }}
          EMAIL: ${{ needs.fetch-xts-candidate.outputs.xts-tag-commit-email }}
        run: |
          SLACK_USER_ID=$(curl -s -X GET "https://slack.com/api/users.list" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" | jq -r --arg email "${EMAIL}" \
            '.members[] | select((.profile.email // "" | ascii_downcase) == ($email | ascii_downcase)) | .name')

          if [[ -z "${SLACK_USER_ID}" || "${SLACK_USER_ID}" == "null" ]]; then
            echo "No Slack user found for email: ${EMAIL}"
            SLACK_USER_ID="No matching slack user found"
          else
            echo "Found slack user for email: ${EMAIL}"
            SLACK_USER_ID="<@${SLACK_USER_ID}>"
          fi
          echo "slack-user-id=${SLACK_USER_ID}" >> "${GITHUB_OUTPUT}"

      - name: Set Rootly Service Name
        id: set-rootly-service
        if: ${{ steps.report-category.outputs.category == 'test' || steps.report-category.outputs.category == 'infrastructure' }}
        run: |
          ROOTLY_SERVICE_NAME="CITR General"
          if [[ "${{ steps.report-category.outputs.category }}" == "infrastructure" ]]; then
            ROOTLY_SERVICE_NAME="CI/CD Workflows"
          fi
          echo "service=${ROOTLY_SERVICE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Build Rootly Summary
        id: rootly-summary
        if: ${{ steps.report-category.outputs.category == 'test' || steps.report-category.outputs.category == 'infrastructure' }}
        env:
          PRINT_FAILED_TESTS_SCRIPT: ".github/workflows/support/scripts/print-failed-tests.sh"
        run: |
          title="The eXtended Test Suite job failed (${{ needs.fetch-xts-candidate.outputs.xts-info }})."

          echo "title=${title}" >> "${GITHUB_OUTPUT}"
          {
            echo 'summary<<EOF'
            echo "------------------------------------"
            echo "Status of each jobs:"
            echo "- Execute XTS: ${{ needs.xts-execution.result }}"
            echo "- Tag for Promotion: ${{ needs.tag-for-promotion.result }}"
            echo "------------------------------------"
            if [[ "${{ needs.xts-execution.result }}" != "success" ]]; then
              echo "XTS tests failed due to a ${{ needs.xts-execution.outputs.failure-mode }} error."
              echo "Failing Test(s):"
              bash "${{ github.workspace }}/${{ env.PRINT_FAILED_TESTS_SCRIPT }}" "${{ needs.xts-execution.outputs.failed-tests }}"
              echo "------------------------------------"
            fi
            echo "Commit information:"
            echo "- Author: ${{ needs.fetch-xts-candidate.outputs.xts-tag-commit-author }}"
            echo "- Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.fetch-xts-candidate.outputs.xts-tag-commit }}>"
            echo "- Workflow: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
            echo "------------------------------------"
            echo "Commit List:"
            echo -e "${{ needs.fetch-xts-candidate.outputs.commit-list }}"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

      - name: Log Rootly Summary
        if: ${{ steps.report-category.outputs.category == 'test' || steps.report-category.outputs.category == 'infrastructure' }}
        run: |
          echo "## Rootly Summary:"
          echo "### Title: ${{ steps.rootly-summary.outputs.title }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.rootly-summary.outputs.summary }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "### Rootly Service" >> "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.set-rootly-service.outputs.service }}" >> "${GITHUB_STEP_SUMMARY}"

      # TEMP: Disabled for mock testing to avoid creating real alerts
      # - name: Create Rootly Alert
      #   id: create-rootly-alert
      #   if: ${{ steps.report-category.outputs.category == 'test' || steps.report-category.outputs.category == 'infrastructure' }}
      #   uses: pandaswhocode/rootly-alert-action@fdae1529e5aed62040016accf719a0ceb7dae57f # v1.0.0
      #   continue-on-error: true
      #   with:
      #     api_key: ${{ secrets.ROOTLY_API_TOKEN }}
      #     summary: "${{ steps.rootly-summary.outputs.title }}"
      #     details: "${{ steps.rootly-summary.outputs.summary }}"
      #     notification_target_type: "Service"
      #     notification_target: ${{ steps.set-rootly-service.outputs.service }}
      #     set_as_noise: "false"
      #     alert_urgency: "High"
      #     external_id: ${{ github.run_id }}
      #     external_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      #     environments: "CITR"

      - name: Build Test Failure Slack Payload
        if: ${{ steps.report-category.outputs.category == 'test' }}
        run: |
          cat <<EOF > slack_payload.json
          {
            "attachments": [
              {
                "color": "#FF0000",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": ":x: XTS - eXtended Test Suite Test Failure Report (${{ needs.fetch-xts-candidate.outputs.xts-info }}) Failed",
                      "emoji": true
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*XTS test failure. See status below.*"
                    },
                    "fields": [
                      {
                        "type": "plain_text",
                        "text": "Fetch XTS Candidate Tag: ${{ needs.fetch-xts-candidate.result }}"
                      },
                      {
                        "type": "plain_text",
                        "text": "XTS Execution: ${{ needs.xts-execution.result }}"
                      },
                      {
                        "type": "plain_text",
                        "text": "Tag as XTS-Passing: ${{ needs.tag-for-promotion.result }}"
                      },
                      {
                        "type": "plain_text",
                        "text": "Failing Test(s): ${{ needs.xts-execution.outputs.failed-tests }}"
                      }
                    ]
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Workflow and Commit Information*"
                    },
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Source Commit*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.fetch-xts-candidate.outputs.xts-tag-commit }}>"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Commit author*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "${{ needs.fetch-xts-candidate.outputs.xts-tag-commit-author }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Slack user*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "${{ steps.find-commit-author-slack.outputs.slack-user-id }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow run ID*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": " ${{ github.run_id }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow run URL*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                      }
                    ]
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Commit List*:"
                    },
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "${{ needs.fetch-xts-candidate.outputs.commit-list }}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Build Infrastructure Failure Slack Payload
        if: ${{ steps.report-category.outputs.category == 'infrastructure' }}
        run: |
          cat <<EOF > slack_payload.json
          {
            "attachments": [
              {
                "color": "#FF8C00",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": ":warning: XTS - eXtended Test Suite Infrastructure Failure Report (${{ needs.fetch-xts-candidate.outputs.xts-info }})",
                      "emoji": true
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Infrastructure issue detected — not a test failure.*"
                    },
                    "fields": [
                      {
                        "type": "plain_text",
                        "text": "Fetch XTS Candidate Tag: ${{ needs.fetch-xts-candidate.result }}"
                      },
                      {
                        "type": "plain_text",
                        "text": "XTS Execution: ${{ needs.xts-execution.result }}"
                      },
                      {
                        "type": "plain_text",
                        "text": "Tag as XTS-Passing: ${{ needs.tag-for-promotion.result }}"
                      }
                    ]
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Workflow run URL*:"
                    },
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Build Infrastructure Failure Summary Payload
        if: ${{ steps.report-category.outputs.category == 'infrastructure' }}
        run: |
          cat <<EOF > slack_payload_summary.json
          {
            "attachments": [
              {
                "color": "#FF8C00",
