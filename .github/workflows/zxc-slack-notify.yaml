# SPDX-License-Identifier: Apache-2.0
name: "ZXC: Slack Notify"
on:
  workflow_call:
    inputs:
      header-emoji:
        description: "Slack emoji code for the notification header (e.g. ':vertical_traffic_light:')"
        type: string
        required: false
        default: ":vertical_traffic_light:"
      header-text:
        description: "Notification header title"
        type: string
        required: true
      result:
        description: "Job result value (success, failure, or cancelled) — determines attachment color"
        type: string
        required: false
        default: ""
      result-label:
        description: "Field label for the result row (e.g. 'Block Node Regression Panel Result')"
        type: string
        required: false
        default: ""
      ref:
        description: "Commit ref or SHA to report on; drives the Source Commit link and git author lookup"
        type: string
        required: true
        default: ""
    secrets:
      webhook:
        description: "Slack incoming webhook URL"
        required: true
      slack-api-token:
        description: "Slack bot token for author email-to-username lookup; omit to skip the mention"
        required: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  notify:
    name: "Send Slack Notification"
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Build Payload
        id: build-payload
        env:
          HEADER_EMOJI: ${{ inputs.header-emoji }}
          HEADER_TEXT: ${{ inputs.header-text }}
          RESULT: ${{ inputs.result }}
          RESULT_LABEL: ${{ inputs.result-label }}
          NOTIFY_REF: ${{ inputs.ref }}
          SLACK_API_TOKEN: ${{ secrets.slack-api-token }}
        run: node --experimental-strip-types .github/scripts/build-slack-payload.mts

      - name: Send Notification
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.webhook }}
          webhook-type: incoming-webhook
          payload-file-path: slack_payload.json
