# SPDX-License-Identifier: Apache-2.0
#  Sets failure-mode output to 'workflow', 'test', 'cancelled', or 'none'.
#
#  Step-outcome mode (test-outcomes / workflow-outcomes):
#    Checks space-separated step outcomes directly.
#    workflow failure > test failure > cancelled > none.
#
#  Job-aggregate mode (job-statuses / job-failure-modes / job-names):
#    Checks parallel arrays of job results and their failure-mode outputs.
#    Same priority ordering; populates failed-tests with names of failing jobs.
#
#  Both modes may be combined; job-aggregate runs after step-outcome.

name: "810: [CALL] Set Failure Mode"
on:
  workflow_call:
    inputs:
      test-outcomes:
        description: "Space-separated step outcome values for test steps. Empty/missing outcomes are treated as non-failures."
        type: string
        required: false
        default: ''
      workflow-outcomes:
        description: "Space-separated step outcome values for infrastructure steps. Empty/missing outcomes are treated as non-failures."
        type: string
        required: false
        default: ''
      job-statuses:
        description: "Space-separated job result values (success/failure/cancelled/skipped). Parallel to job-failure-modes and job-names."
        type: string
        required: false
        default: ''
      job-failure-modes:
        description: "Space-separated failure-mode values for each entry in job-statuses (none/test/workflow/cancelled)."
        type: string
        required: false
        default: ''
      job-names:
        description: "Space-separated job names corresponding to job-statuses, used in the failed-tests output."
        type: string
        required: false
        default: ''
    outputs:
      failure-mode:
        description: "none, test, workflow, or cancelled"
        value: ${{ jobs.compute.outputs.failure-mode }}
      failed-tests:
        description: "Comma-separated list of failed/cancelled job names (job-aggregate mode)"
        value: ${{ jobs.compute.outputs.failed-tests }}

defaults:
  run:
    shell: bash

jobs:
  compute:
    name: "Compute Failure Mode"
    runs-on: ubuntu-latest
    outputs:
      failure-mode: ${{ steps.compute.outputs.failure-mode }}
      failed-tests: ${{ steps.compute.outputs.failed-tests }}
    steps:
      - name: Compute
        id: compute
        env:
          INPUT_TEST_OUTCOMES: ${{ inputs.test-outcomes }}
          INPUT_WORKFLOW_OUTCOMES: ${{ inputs.workflow-outcomes }}
          INPUT_JOB_STATUSES: ${{ inputs.job-statuses }}
          INPUT_JOB_FAILURE_MODES: ${{ inputs.job-failure-modes }}
          INPUT_JOB_NAMES: ${{ inputs.job-names }}
        run: |
          failure_mode="none"
          failed_tests=""

          has_failure() {
            local arr=("$@")
            for status in "${arr[@]}"; do
              [[ "${status}" == "failure" ]] && return 0
            done
            return 1
          }

          has_cancellation() {
            local arr=("$@")
            for status in "${arr[@]}"; do
              [[ "${status}" == "cancelled" ]] && return 0
            done
            return 1
          }

          # Step-outcome mode: check space-separated step outcomes directly.
          read -ra test_arr <<< "${INPUT_TEST_OUTCOMES}"
          read -ra workflow_arr <<< "${INPUT_WORKFLOW_OUTCOMES}"

          if has_failure "${test_arr[@]}"; then
            failure_mode="test"
          fi
          if has_failure "${workflow_arr[@]}"; then
            failure_mode="workflow"
          fi
          if [[ "${failure_mode}" == "none" ]]; then
            if has_cancellation "${workflow_arr[@]}" || has_cancellation "${test_arr[@]}"; then
              failure_mode="cancelled"
            fi
          fi

          # Job-aggregate mode: check parallel arrays of job results and failure-modes.
          read -ra job_status_arr <<< "${INPUT_JOB_STATUSES}"
          read -ra job_failure_mode_arr <<< "${INPUT_JOB_FAILURE_MODES}"
          read -ra job_names_arr <<< "${INPUT_JOB_NAMES}"

          for i in "${!job_status_arr[@]}"; do
            status="${job_status_arr[$i]}"
            mode="${job_failure_mode_arr[$i]:-none}"
            name="${job_names_arr[$i]:-job-$i}"

            if [[ "$status" == "failure" ]]; then
              # Cancelled steps inside a failing job = infrastructure issue.
              [[ "$mode" == "cancelled" ]] && mode="workflow"
              case "$mode" in
                workflow) failure_mode="workflow" ;;
                test) [[ "$failure_mode" != "workflow" ]] && failure_mode="test" ;;
                # mode=none: job failed but has no classification — track it but don't change failure_mode
              esac
              failed_tests="${failed_tests:+${failed_tests}, }${name}"
            elif [[ "$status" == "cancelled" ]]; then
              [[ "$failure_mode" == "none" ]] && failure_mode="cancelled"
              failed_tests="${failed_tests:+${failed_tests}, }${name} (cancelled)"
            fi
          done

          echo "failure-mode=${failure_mode}" >> "${GITHUB_OUTPUT}"
          echo "failed-tests=${failed_tests}" >> "${GITHUB_OUTPUT}"
