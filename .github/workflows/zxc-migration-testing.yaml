# SPDX-License-Identifier: Apache-2.0
name: "ZXC: Migration Testing"
on:
  workflow_call:
    inputs:
      ref:
        description: "The branch, tag, or SHA to checkout:"
        required: false
        type: string
      custom-job-name:
        description: "The custom job name to use for the job:"
        required: false
        type: string
      solo-version:
        description: "The version of solo to install (if not specified, latest will be used):"
        required: false
        type: string
      java-version:
        description: "Java JDK Version:"
        type: string
        required: false
    secrets:
      access-token:
        description: "GitHub Access Token with write permissions to the repository."
        required: true
      slack-detailed-report-webhook:
        description: "Slack Webhook URL for Detailed Test Reporting."
        required: true

defaults:
  run:
    shell: bash

permissions:
  checks: write
  contents: read
  actions: write
  statuses: write
  id-token: write

jobs:
  migration-testing:
    timeout-minutes: 60
    name: ${{ inputs.custom-job-name || 'Standard' }}
    runs-on: hl-cn-migration-lin-lg
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref || '' }}"
          checkout-fetch-depth: "0"
          checkout-token: "${{secrets.GITHUB_TOKEN}}"
          setup-java: "true"
          java-distribution: "temurin"
          java-version: "${{ inputs.java-version }}"
          setup-gradle: "true"
          gradle-cache-read-only: "false"
          setup-node: "true"
          node-version: "22"

      # Build the local hedera-node artifacts (hedera-node/data) that step 3
      # of the migration script stages onto each consensus node via
      # `solo consensus network upgrade --local-build-path`.
      - name: Build hiero-consensus-node
        run: ionice -c 2 -n 2 nice -n 19 ./gradlew assemble

      # Install solo. The script also looks for solo in $HOME/.npm-global/bin
      # as a fallback (for non-sudo macOS dev setups), but on the CI runner we
      # let `npm install -g` go to the system prefix.
      - name: Install Solo
        run: |
          # Migration testing requires solo >= 0.73.0 — older versions have a
          # --local-build-path bug that leaves baseline jars alongside local ones,
          # causing schema-migration NoSuchMethodError at node startup.
          # Honor the caller's version if it meets the minimum, otherwise floor it.
          REQUESTED="${{ inputs.solo-version || 'latest' }}"
          MIN_VERSION="0.73.0"
          if [[ "${REQUESTED}" == "latest" ]] || \
             [[ "$(printf '%s\n' "${REQUESTED#v}" "${MIN_VERSION}" | sort -V | tail -1)" == "${REQUESTED#v}" ]]; then
            RESOLVED="${REQUESTED}"
          else
            echo "Solo version ${REQUESTED} is below required minimum ${MIN_VERSION}; using ${MIN_VERSION}"
            RESOLVED="${MIN_VERSION}"
          fi
          npm install -g "@hashgraph/solo@${RESOLVED}"

      # Install kind without creating a cluster; the migration script invokes
      # `kind create cluster -n solo-migration` itself.
      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30
          version: v0.26.0
          kubectl_version: v1.31.4
          verbosity: 3
          wait: 120s

      # Steps 1-4 + 4a are all in this driver:
      #   1) Version detection (version.txt -> previous-minor tag)
      #   2) Solo 3-node + Mirror Node (with --pinger) deployment at prev_tag
      #   3) `solo consensus network upgrade --local-build-path` to local
      #   4) CryptoCreate via @hashgraph/sdk + mirror REST poll
      #   4a) Mirror importer log scan for ERROR-level entries
      - name: Run migration test
        env:
          KEEP_NETWORK: "true" # keep kind alive so post-run log collection can reach it
        run: ./hedera-node/test-clients/scripts/solo/migration-testing/solo-migration-test.sh

      - name: Collect CN + Mirror Node Logs
        if: always()
        run: |
          # Mirror Node importer log (full, since this is what step 4a checks).
          kubectl --context kind-solo-migration logs -n solo -l "app.kubernetes.io/component=importer,app.kubernetes.io/instance=mirror-1" \
            --all-containers --since=24h --timestamps --prefix --tail=-1 > mirror-importer.log || true

          # All consensus node + Solo logs. Unset KUBERNETES_SERVICE_HOST so
          # solo's k8s client doesn't auto-use the ARC pod's SA token (which kind
          # rejects with 403); forces it to read ~/.kube/config like kubectl does.
          env -u KUBERNETES_SERVICE_HOST solo deployment diagnostics all -d solo-migration --dev -q || true
          LOG_FOLDER="${HOME}/.solo/logs/solo"
          echo "CN_LOG_FOLDER=${LOG_FOLDER}" >> "${GITHUB_ENV}"
          ls -lR "${LOG_FOLDER}" || true

      - name: Upload Mirror Importer Log
        if: always()
        id: upload_mn_logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mn-log
          path: mirror-importer.log

      - name: Upload CN Logs
        if: always()
        id: upload_cn_logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cn-logs
          path: ${{ env.CN_LOG_FOLDER }}/*.zip

      - name: Add Logs to Summary
        if: always()
        run: |
          {
            echo "### 📜 Logs"
            echo ""
            echo "Artifacts:"
            echo "- [Mirror Node importer log](${{ steps.upload_mn_logs.outputs.artifact-url }})"
            echo "- [Consensus Node logs](${{ steps.upload_cn_logs.outputs.artifact-url }})"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Stop solo + delete cluster
        if: ${{ always() }}
        run: |
          kind delete cluster -n solo-migration || true

  report-migration-testing-status:
    name: ${{ inputs.custom-job-name || 'Standard' }} Slack Report
    runs-on: hl-cn-migration-lin-sm
    needs: migration-testing
    if: ${{ always() }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Build Slack Payload Message
        id: payload
        run: |
          COLOR="#FF0000"
          if [[ "${{ needs.migration-testing.result }}" == "success" ]]; then
            COLOR="#00FF00"
          elif [[ "${{ needs.migration-testing.result }}" == "cancelled" ]]; then
            COLOR="#555555"
          fi
          cat <<EOF > slack_payload.json
          {
            "attachments": [
              {
                "color": "${COLOR}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": ":vertical_traffic_light: Hiero Consensus Node - Migration Testing Report",
                      "emoji": true
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Migration Testing Panel was executed. See status below.*"
                    },
                    "fields": [
                      {
                        "type": "plain_text",
                        "text": "Migration Testing Panel Result"
                      },
                      {
                        "type": "plain_text",
                        "text": "${{ needs.migration-testing.result }}"
                      }
                    ]
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Workflow and Commit Information*"
                    },
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Source Commit*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ inputs.ref }}>"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow run ID*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": " ${{ github.run_id }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow run URL*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Report Status to Detailed Test Reports Channel
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.slack-detailed-report-webhook }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json
