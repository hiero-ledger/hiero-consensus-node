# SPDX-License-Identifier: Apache-2.0
name: "[CITR] MATS Dry Run"
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "The git ref (branch or tag) to checkout"
        required: false
        default: ""
      enable-spotless-check:
        description: "Spotless Check Enabled"
        type: boolean
        required: false
        default: true
      enable-dependency-check:
        description: "Dependency Check Enabled"
        type: boolean
        required: false
        default: true
      enable-unit-tests:
        description: "Unit Testing Enabled"
        type: boolean
        required: false
        default: true
      enable-integration-tests:
        description: "Integration Testing Enabled"
        type: boolean
        required: false
        default: true
      enable-hapi-tests:
        description: "HAPI Testing Enabled"
        type: boolean
        required: false
        default: true
      enable-otter-tests:
        description: "Otter Tests Enabled"
        type: boolean
        required: false
        default: true
      enable-snyk-scan:
        description: "Snyk Scan Enabled"
        type: boolean
        required: false
        default: true
      enable-gradle-determinism:
        description: "Gradle Build Determinism Check Enabled"
        type: boolean
        required: false
        default: true
      enable-docker-determinism:
        description: "Docker Build Determinism Check Enabled"
        type: boolean
        required: false
        default: true
      custom-job-label:
        description: "Custom Job Label"
        type: string
        required: false
        default: "MATS Tests"

permissions:
  id-token: write
  actions: read
  pull-requests: write
  statuses: write
  checks: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  mats-tests:
    name: MATS Tests
    uses: ./.github/workflows/zxc-mats-tests.yaml
    with:
      ref: ${{ inputs.ref || '' }}
      enable-spotless-check: "${{ inputs.enable-spotless-check || 'false' }}"
      enable-dependency-check: "${{ inputs.enable-dependency-check || 'false' }}"
      enable-unit-tests: "${{ inputs.enable-unit-tests || 'false' }}"
      enable-integration-tests: "${{ inputs.enable-integration-tests || 'false' }}"
      enable-hapi-tests: "${{ inputs.enable-hapi-tests || 'false' }}"
      enable-hapi-tests-crypto: "${{ inputs.enable-hapi-tests || 'false' }}"
      enable-otter-tests: "${{ inputs.enable-otter-tests || 'false' }}"
      enable-snyk-scan: "${{ inputs.enable-snyk-scan || 'false' }}"
      enable-gradle-determinism: "${{ inputs.enable-gradle-determinism || 'false' }}"
      enable-docker-determinism: "${{ inputs.enable-docker-determinism || 'false' }}"
      java-version: "21.0.6"
      java-distribution: "temurin"
      custom-job-label: "${{ inputs.custom-job-label || 'MATS (dry-run):' }}"
    secrets:
      access-token: ${{ secrets.GITHUB_TOKEN }}
      codacy-project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
      codecov-token: ${{ secrets.CODECOV_TOKEN }}
      gradle-cache-username: ${{ secrets.GRADLE_CACHE_USERNAME }}
      gradle-cache-password: ${{ secrets.GRADLE_CACHE_PASSWORD }}
      snyk-token: ${{ secrets.SNYK_TOKEN }}

  report-flaky-tests:
    name: Report Flaky Tests
    runs-on: hl-cn-default-lin-sm
    needs:
      - mats-tests
    if: ${{ !cancelled() && always() }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: "1"
          ref: ${{ inputs.ref || github.ref }}

      - name: Download Test Report Artifacts
        id: download-test-reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          pattern: "*Test*Report*"
          path: test-reports/

      - name: Collect Flaky Tests
        id: collect-flaky-tests
        if: ${{ steps.download-test-reports.outcome == 'success' }}
        run: |
          bash "${{ github.workspace }}/.github/workflows/support/scripts/collect-flaky-tests.sh" \
            "test-reports" \
            "flaky-tests.txt"
          FLAKY_COUNT=$(wc -l < flaky-tests.txt | tr -d ' ')
          echo "flaky-count=${FLAKY_COUNT}" >> "${GITHUB_OUTPUT}"

      - name: Report Flaky Tests to Step Summary
        if: ${{ steps.collect-flaky-tests.outputs.flaky-count > 0 }}
        run: |
          {
            echo "## Flaky Tests Detected"
            echo ""
            echo "The following tests were flaky in this CI run (failed initially but passed on retry):"
            echo ""
            echo "| Test |"
            echo "|------|"
            while IFS= read -r test; do
              echo "| \`${test}\` |"
            done < flaky-tests.txt
            echo ""
            echo "> **Note:** Flaky tests are informational only and did not fail the build."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Report No Flaky Tests to Step Summary
        if: ${{ steps.download-test-reports.outcome == 'success' && steps.collect-flaky-tests.outputs.flaky-count == 0 }}
        run: |
          echo "## No Flaky Tests Detected" >> "${GITHUB_STEP_SUMMARY}"
