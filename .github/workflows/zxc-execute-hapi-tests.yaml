            hedera-node/test-clients/output/**
          retention-days: 7

      - name: Upload HAPI Test (Misc Records) Failure Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ steps.gradle-hapi-misc-records.conclusion == 'failure' && !cancelled() }}
        with:
          name: HAPI Test (Misc Records) Failure Artifacts
          path: |
            hedera-node/test-clients/build/**/*.blk.gz
            hedera-node/test-clients/build/**/*.rcd.gz
            hedera-node/test-clients/build/**/*.pb
            hedera-node/test-clients/build/**/*.pces
          retention-days: 7

      - name: Save Memory Report
        if: always()
        run: |
          kill "$(cat /tmp/mem_monitor.pid)" 2>/dev/null || true
          peak_runner_kb=$(awk -F',' '{if($2>m)m=$2}END{print m+0}' /tmp/mem_runner.csv)
          total_kb=$(awk '/MemTotal/{print $2; exit}' /proc/meminfo)
          {
            echo "runner_peak_mb=$((peak_runner_kb / 1024))"
            echo "runner_total_mb=$((total_kb / 1024))"
            for f in /tmp/time_*.txt; do
              [ -f "$f" ] || continue
              task="${f#/tmp/time_}"
              task="${task%.txt}"
              peak_kb=$(grep "Maximum resident" "$f" | awk '{print $NF}')
              [ -n "$peak_kb" ] && echo "task:${task}:peak_mb=$((peak_kb / 1024))"
            done
          } > /tmp/mem_report.txt

      - name: Upload Memory Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: memory-report-misc-records
          path: /tmp/mem_report.txt
          retention-days: 7

