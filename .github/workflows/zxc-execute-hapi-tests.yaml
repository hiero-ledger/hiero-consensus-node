    steps:
      - name: Prepare Runner
        uses: pandaswhocode/initialize-github-job@bfe0b1633012cee3033c757c7095d49c360e23a6 # v1.0.1
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref }}"
          checkout-fetch-depth: "1"
          checkout-token: "${{ secrets.access-token }}"
          setup-java: "true"
          java-version: "${{ inputs.java-version }}"
          java-distribution: "${{ inputs.java-distribution }}"
          setup-gradle: "true"
          gradle-cache-read-only: "false"
          setup-node: "true"
          node-version: "${{ inputs.node-version }}"

      - name: HAPI Testing (Block Node Communication)
        id: gradle-hapi-bn-communication
        env:
          LC_ALL: en.UTF-8
          LANG: en_US.UTF-8
        run: ${GRADLE_EXEC} hapiTestBlockNodeCommunication

      - name: Publish HAPI Test (Block Node Communication) Report
        uses: step-security/publish-unit-test-result-action@7dff603bf17ef13dee847147bef8d7cd1728b566 # v2.22.0
        with:
          check_name: "Node: HAPI Test (Block Node Communication) Results"
          json_thousands_separator: ","
          junit_files: "**/test-clients/build/test-results/testSubprocess/TEST-*.xml"
          comment_mode: errors # only comment if we could not find or parse the JUnit XML files

      - name: Upload HAPI Test (Block Node Communication) Report Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: HAPI Test (Block Node Communication) Report
          path: "**/test-clients/build/test-results/testSubprocess/TEST-*.xml"
          retention-days: 7

      - name: Detect Flaky Tests (Block Node Communication)
        id: detect-flaky-hapi-bn-communication
        if: ${{ !cancelled() }}
        run: |
          has_flaky="false"
          if grep -rql "<flakyFailure" hedera-node/test-clients/build/test-results/ --include="TEST-*.xml" 2>/dev/null; then
            has_flaky="true"
          fi
          echo "has-flaky=${has_flaky}" >> "${GITHUB_OUTPUT}"

      - name: Upload HAPI Test (Block Node Communication) Network Logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && inputs.enable-network-log-capture && (steps.gradle-hapi-bn-communication.conclusion == 'failure' || steps.detect-flaky-hapi-bn-communication.outputs.has-flaky == 'true') }}
        with:
          name: HAPI Test (Block Node Communication) Network Logs
          path: |
            hedera-node/test-clients/build/*-test/**/output/**
          retention-days: 7

      - name: Upload HAPI Test (Block Node Communication) Failure Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && (steps.gradle-hapi-bn-communication.conclusion == 'failure' || steps.detect-flaky-hapi-bn-communication.outputs.has-flaky == 'true') }}
        with:
          name: HAPI Test (Block Node Communication) Failure Artifacts
          path: |
            hedera-node/test-clients/build/**/*.blk.gz
            hedera-node/test-clients/build/**/*.rcd.gz
            hedera-node/test-clients/build/**/*.pb
            hedera-node/test-clients/build/**/*.pces
            hedera-node/test-clients/build/*-test/**/output/**
            hedera-node/test-clients/build/*-test/**/*.log
            hedera-node/test-clients/output/**
          retention-days: 7

