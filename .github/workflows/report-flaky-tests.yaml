# SPDX-License-Identifier: Apache-2.0
name: "Report Flaky Tests"
on:
  workflow_call:
    inputs:
      workflow-context:
        description: "Context: pr-checks, dry-run, or main-scheduled"
        type: string
        required: true
    secrets:
      access-token:
        required: true
    outputs:
      flaky-count:
        description: "Number of flaky tests detected"
        value: ${{ jobs.report.outputs.flaky-count }}
      flaky-tests-json:
        description: "JSON array of flaky tests with issue info"
        value: ${{ jobs.report.outputs.flaky-tests-json }}
      has-new-issues:
        description: "Whether any new issues were created"
        value: ${{ jobs.report.outputs.has-new-issues }}

permissions:
  issues: write
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  report:
    name: Report Flaky Tests
    runs-on: hl-cn-default-lin-sm
    concurrency:
      group: report-flaky-tests
      cancel-in-progress: false
    outputs:
      flaky-count: ${{ steps.set-outputs.outputs.flaky-count }}
      flaky-tests-json: ${{ steps.set-outputs.outputs.flaky-tests-json }}
      has-new-issues: ${{ steps.set-outputs.outputs.has-new-issues }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: "1"
          ref: ${{ github.sha }}

      - name: Download Test Report Artifacts
        id: download-test-reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          pattern: "*Test*Report*"
          path: test-reports/

      - name: Collect Flaky Tests
        id: collect-flaky-tests
        if: ${{ steps.download-test-reports.outcome == 'success' }}
        run: |
          bash "${{ github.workspace }}/.github/workflows/support/scripts/collect-flaky-tests.sh" \
            "test-reports" \
            "flaky-tests.json"
          FLAKY_COUNT=$(jq 'length' flaky-tests.json)
          echo "flaky-count=${FLAKY_COUNT}" >> "${GITHUB_OUTPUT}"

      - name: Process Flaky Issues
        id: process-flaky-issues
        if: ${{ steps.collect-flaky-tests.outputs.flaky-count > 0 }}
        env:
          GH_TOKEN: ${{ secrets.access-token }}
        run: |
          # Determine PR number if available
          PR_NUMBER=""
          if [[ "${{ inputs.workflow-context }}" == "pr-checks" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [[ "${{ inputs.workflow-context }}" == "dry-run" ]]; then
            BRANCH="${{ github.head_ref || github.ref_name }}"
            PR_NUMBER=$(gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          fi

          bash "${{ github.workspace }}/.github/workflows/support/scripts/report-flaky-issues.sh" \
            "flaky-tests.json" \
            "${{ github.workspace }}/.github/flaky-test-managers.yml" \
            "${{ github.workflow }}" \
            "${{ github.run_number }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${PR_NUMBER}"

      - name: Post PR Comment
        if: ${{ steps.collect-flaky-tests.outputs.flaky-count > 0 && inputs.workflow-context != 'main-scheduled' }}
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6
        with:
          github-token: ${{ secrets.access-token }}
          script: |
            const fs = require('fs');
            const flakyIssues = JSON.parse(fs.readFileSync('flaky-issues.json', 'utf8'));
            if (flakyIssues.length === 0) return;

            // Determine PR number
            let prNumber = null;
            const workflowContext = '${{ inputs.workflow-context }}';

            if (workflowContext === 'pr-checks') {
              prNumber = context.payload.pull_request?.number;
            } else if (workflowContext === 'dry-run') {
              const branch = '${{ github.head_ref || github.ref_name }}';
              try {
                const { data: prs } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head: `${context.repo.owner}:${branch}`,
                  state: 'open',
                  per_page: 1,
                });
                if (prs.length > 0) {
                  prNumber = prs[0].number;
                }
              } catch (e) {
                core.notice(`Could not detect PR for branch ${branch}: ${e.message}`);
              }
            }

            if (!prNumber) {
              core.notice('No PR found for this run — skipping PR comment.');
              return;
            }

            const hasNew = flakyIssues.some(t => t.is_new);
            const marker = '<!-- flaky-test-report -->';

            let body = marker + '\n';
            if (hasNew) {
              body += '## ⚠️ New Flaky Test(s) Detected — Action Required\n\n';
              body += 'New flaky tests were detected in this run. **New tickets have been created and require your attention — please investigate whether the flakiness was introduced by changes in this PR.**\n\n';
            } else {
              body += '## Flaky Test(s) Detected\n\n';
              body += 'One or more flaky tests were detected in this run. These tests have been reported before.\n\n';
            }

            body += '| Test | Ticket |\n';
            body += '|------|--------|\n';
            for (const test of flakyIssues) {
              const testName = `\`${test.module} - ${test.class}#${test.method}\``;
              if (hasNew) {
                const status = test.is_new ? '🆕 New' : '🔁 Existing';
                body += `| ${testName} | #${test.issue_number} (${status}) |\n`;
              } else {
                body += `| ${testName} | #${test.issue_number} |\n`;
              }
            }

            if (hasNew) {
              body += '\nPlease review the linked tickets and determine if any of the new issues were caused by your changes.\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });

      - name: Write Step Summary
        if: ${{ steps.collect-flaky-tests.outputs.flaky-count > 0 }}
        run: |
          {
            echo "## Flaky Tests Detected"
            echo ""
            echo "The following tests were flaky in this CI run (failed initially but passed on retry):"
            echo ""

            if [[ -f "flaky-issues.json" ]]; then
              echo "| Test | Ticket | Status |"
              echo "|------|--------|--------|"
              jq -r '.[] | "| `\(.module) - \(.class)#\(.method)` | #\(.issue_number) | [\(if .is_new then "🆕 New" else "Existing" end)](\(.issue_url)) |"' flaky-issues.json
            else
              echo "| Test |"
              echo "|------|"
              jq -r '.[] | "| `\(.class)#\(.method)` |"' flaky-tests.json
            fi
            echo ""
            echo "> **Note:** Flaky tests are informational only and did not fail the build."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Write No Flaky Tests Summary
        if: ${{ steps.download-test-reports.outcome == 'success' && (steps.collect-flaky-tests.outputs.flaky-count == 0 || steps.collect-flaky-tests.outputs.flaky-count == '') }}
        run: |
          echo "## No Flaky Tests Detected" >> "${GITHUB_STEP_SUMMARY}"

      - name: Set Outputs
        id: set-outputs
        run: |
          FLAKY_COUNT="${{ steps.collect-flaky-tests.outputs.flaky-count }}"
          FLAKY_COUNT="${FLAKY_COUNT:-0}"
          echo "flaky-count=${FLAKY_COUNT}" >> "${GITHUB_OUTPUT}"

          if [[ -f "flaky-issues.json" ]]; then
            # Use jq -c for compact JSON output suitable for workflow outputs
            FLAKY_JSON=$(jq -c '.' flaky-issues.json)
            echo "flaky-tests-json=${FLAKY_JSON}" >> "${GITHUB_OUTPUT}"

            HAS_NEW=$(jq 'any(.is_new == true)' flaky-issues.json)
            echo "has-new-issues=${HAS_NEW}" >> "${GITHUB_OUTPUT}"
          else
            echo "flaky-tests-json=[]" >> "${GITHUB_OUTPUT}"
            echo "has-new-issues=false" >> "${GITHUB_OUTPUT}"
          fi
