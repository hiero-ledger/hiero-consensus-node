# SPDX-License-Identifier: Apache-2.0
name: "899: [DISP] Test Slack Templates"
on:
  workflow_dispatch:
    inputs:
      result:
        description: "Simulated job result to render"
        required: true
        type: choice
        default: "success"
        options:
          - success
          - failure
          - cancelled
      template:
        description: "Template file to render (relative to .github/workflows/templates/)"
        required: true
        type: string
        default: "slack-regression-report.json.tpl"

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  test-slack-template:
    name: Render & Send Template
    runs-on: hl-cn-default-lin-sm
    steps:
      - name: Initialize GitHub Job
        uses: pandaswhocode/initialize-github-job@3be139d343b1a60e1fcfc70f602ee804bbe3495d # v1.1.1
        with:
          checkout: "true"
          checkout-token: "${{ secrets.GITHUB_TOKEN }}"
          setup-gomplate: "true"
          setup-jq: "true"

      - name: Build Slack Payload
        id: payload
        env:
          HEADER_TEXT: "[TEST] Hiero Consensus Node - Regression Test Report"
          STATUS_TEXT: "*This is a test render of the Slack template.*"
          PANEL_LABEL: "Test Panel Result"
          RESULT: ${{ inputs.result }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD=$(gomplate -f ".github/workflows/templates/${{ inputs.template }}" | jq -c .)
          echo "slack_payload=${PAYLOAD}" >> "$GITHUB_OUTPUT"

      - name: Send to Test Slack Channel
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_TEST_MESSAGES_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: ${{ steps.payload.outputs.slack_payload }}
