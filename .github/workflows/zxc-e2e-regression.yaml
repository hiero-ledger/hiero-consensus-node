# SPDX-License-Identifier: Apache-2.0
name: "ZXC: E2E Regression"
on:
  workflow_call:
    inputs:
      ref:
        description: "The branch, tag, or SHA to checkout:"
        required: false
        type: string
      custom-job-name:
        description: "The custom job name to use for the job:"
        required: false
        type: string
      solo-version:
        description: "The version of solo to install (if not specified, latest will be used):"
        required: false
        type: string
    secrets:
      access-token:
        description: "GitHub Access Token with read permissions to the repository."
        required: true
      slack-detailed-report-webhook:
        description: "Slack Webhook URL for detailed test reporting."
        required: true

defaults:
  run:
    shell: bash

permissions:
  checks: write
  contents: read
  actions: write
  statuses: write
  id-token: write

env:
  GRADLE_EXEC: ionice -c 2 -n 2 nice -n 19 ./gradlew
  E2E_ARTIFACT_DIR: ${{ github.workspace }}/e2e-regression-artifacts
  E2E_SOLO_HOME: ${{ github.workspace }}/e2e-regression-artifacts/solo-home

jobs:
  e2e-regression:
    name: ${{ inputs.custom-job-name || 'Standard' }}
    runs-on: hl-cn-bn-regression-lin-lg
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout Consensus Node
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || '' }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: 21.0.6

      - name: Setup NodeJS Environment
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.18.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0
        with:
          cache-read-only: false

      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30
          version: v0.26.0
          kubectl_version: v1.31.4
          verbosity: 3
          wait: 120s

      - name: Install Solo
        run: npm install -g "@hashgraph/solo@${{ inputs.solo-version || 'latest' }}"

      - name: Build hiero-consensus-node
        run: ${GRADLE_EXEC} assemble

      - name: Execute block node outage E2E
        run: |
          mkdir -p "${E2E_ARTIFACT_DIR}"
          chmod +x ./hedera-node/test-clients/scripts/solo/e2e-backpressure/solo-e2e-block-node-outage.sh
          ./hedera-node/test-clients/scripts/solo/e2e-backpressure/solo-e2e-block-node-outage.sh
        env:
          SOLO_HOME: ${{ env.E2E_SOLO_HOME }}
          ARTIFACT_DIR: ${{ env.E2E_ARTIFACT_DIR }}
          KEEP_NETWORK: "false"

      - name: Upload E2E regression artifacts
        if: always()
        id: upload_e2e_artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-regression-artifacts
          path: ${{ env.E2E_ARTIFACT_DIR }}
          retention-days: 7

      - name: Add artifact link to summary
        if: always()
        run: |
          {
            echo "### E2E Regression Artifacts"
            echo "- [Download E2E Regression Artifacts](${{ steps.upload_e2e_artifacts.outputs.artifact-url }})"
          } >> "$GITHUB_STEP_SUMMARY"

  report-e2e-regression-status:
    name: ${{ inputs.custom-job-name || 'Standard' }} Slack Report
    runs-on: hl-cn-bn-regression-lin-sm
    needs: e2e-regression
    if: ${{ always() }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Build Slack Payload Message
        run: |
          COLOR="#FF0000"
          if [[ "${{ needs.e2e-regression.result }}" == "success" ]]; then
            COLOR="#00FF00"
          elif [[ "${{ needs.e2e-regression.result }}" == "cancelled" ]]; then
            COLOR="#555555"
          fi
          cat <<EOF > slack_payload.json
          {
            "attachments": [
              {
                "color": "${COLOR}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": ":vertical_traffic_light: Hiero Consensus Node - E2E Regression Panel Report",
                      "emoji": true
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*E2E Regression Panel was executed. See status below.*"
                    },
                    "fields": [
                      {
                        "type": "plain_text",
                        "text": "E2E Regression Panel Result"
                      },
                      {
                        "type": "plain_text",
                        "text": "${{ needs.e2e-regression.result }}"
                      }
                    ]
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Workflow and Commit Information*"
                    },
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Source Commit*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ inputs.ref }}>"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow run ID*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": " ${{ github.run_id }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow run URL*:"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Report Status to Detailed Test Reports Channel
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.slack-detailed-report-webhook }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json
