name: Nightly Canonical Tests (Fail-Fast)

on:
  workflow_dispatch:
    inputs:
      ref:
        required: true
        default: "main"
        description: "Version of hiero-consensus-node: branch, tag, commit"
        type: string

      build-tag:
        required: true
        description: "build-XXXXX tag associated with the ref input"
        type: string

      test-list:
        required: false
        description: "Space-separated test names (empty = use default from config)"
        type: string
        default: ""

      fail-fast:
        required: false
        default: true
        description: "Stop on first test failure"
        type: boolean

      parallel:
        required: false
        default: false
        description: "Run tests in parallel (experimental, overrides fail-fast)"
        type: boolean

      version-service:
        required: true
        description: "Hedera services version"
        type: string

      version-mirrornode:
        required: true
        description: "Mirror node version"
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

env:
  CONFIG_FILE: github/config/test_config.yaml
  JENKINS_JOB_NAME: nightly-jenkins

jobs:
  # Job 1: Initialize - Parse test configuration and prepare matrix
  initialize:
    runs-on: ubuntu-latest
    outputs:
      test_matrix: ${{ steps.parse-tests.outputs.matrix }}
      test_list: ${{ steps.parse-tests.outputs.list }}
      max_parallel: ${{ steps.parse-tests.outputs.max_parallel }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse Test Configuration
        id: parse-tests
        run: |
          set -euo pipefail

          # Load test config
          CONFIG_FILE="${{ env.CONFIG_FILE }}"

          if [[ ! -f "$CONFIG_FILE" ]]; then
            echo "Error: Config file not found: $CONFIG_FILE"
            exit 1
          fi

          # Get test list (from input or default)
          TEST_LIST="${{ inputs.test-list }}"
          if [[ -z "$TEST_LIST" ]]; then
            TEST_LIST=$(yq eval '.default_test_list' "$CONFIG_FILE")
          fi

          echo "Test list: $TEST_LIST"

          # Convert to JSON array for matrix
          TEST_ARRAY=$(echo "$TEST_LIST" | tr ' ' '\n' | jq -R . | jq -s .)
          echo "matrix=$TEST_ARRAY" >> "$GITHUB_OUTPUT"
          echo "list=$TEST_LIST" >> "$GITHUB_OUTPUT"

          # Determine parallelism
          if [[ "${{ inputs.parallel }}" == "true" ]]; then
            echo "max_parallel=5" >> "$GITHUB_OUTPUT"
          else
            echo "max_parallel=1" >> "$GITHUB_OUTPUT"
          fi

          echo "Test matrix prepared: $TEST_ARRAY"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

  # Job 2: Run Tests - Sequential execution with fail-fast
  run-tests:
    needs: initialize
    runs-on: ubuntu-latest
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      max-parallel: ${{ fromJson(needs.initialize.outputs.max_parallel) }}
      matrix:
        test: ${{ fromJson(needs.initialize.outputs.test_matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          set -euo pipefail

          # Install jq if not present
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          # Install yq for YAML parsing
          if ! command -v yq &> /dev/null; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi

          echo "Environment setup complete"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger Jenkins Job
        id: trigger
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
          TEST_NAME: ${{ matrix.test }}
          BUILD_TAG: ${{ inputs.build-tag }}
          VERSION_SERVICE: ${{ inputs.version-service }}
          VERSION_MIRRORNODE: ${{ inputs.version-mirrornode }}
        run: |
          set -euo pipefail

          echo "Triggering Jenkins job for test: ${TEST_NAME}"

          # Make script executable
          chmod +x .github/workflows/support/scripts/jenkins_trigger.sh

          # Trigger build with FAIL_FAST=true and single test
          QUEUE_ID=$(.github/workflows/support/scripts/jenkins_trigger.sh trigger \
            "$JENKINS_URL" "${{ env.JENKINS_JOB_NAME }}" \
            --user "$JENKINS_USER" \
            --token "$JENKINS_TOKEN" \
            --param "TEST_LIST=${TEST_NAME}" \
            --param "FAIL_FAST=true" \
            --param "BUILD_TAG=${BUILD_TAG}" \
            --param "VERSION_SERVICE=${VERSION_SERVICE}" \
            --param "VERSION_MIRRORNODE=${VERSION_MIRRORNODE}" \
            --param "SLACK_CHANNEL=${{ secrets.SLACK_CHANNEL }}" \
            --param "TEST_CLUSTER=${{ secrets.TEST_CLUSTER }}" \
            --param "TEST_NETWORK=${{ secrets.TEST_NETWORK }}" \
            --param "GCS_BUCKET_DEST=${{ secrets.GCS_BUCKET_DEST }}")

          echo "queue_id=$QUEUE_ID" >> "$GITHUB_OUTPUT"
          echo "Jenkins job queued with ID: $QUEUE_ID"

      - name: Wait for Jenkins Job to Start
        id: wait-start
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
          QUEUE_ID: ${{ steps.trigger.outputs.queue_id }}
        run: |
          set -euo pipefail

          echo "Waiting for Jenkins job to start..."

          BUILD_NUM=$(./github/scripts/jenkins_trigger.sh wait-start \
            "$JENKINS_URL" "${{ env.JENKINS_JOB_NAME }}" \
            --user "$JENKINS_USER" \
            --token "$JENKINS_TOKEN" \
            --queue-id "$QUEUE_ID")

          echo "build_number=$BUILD_NUM" >> "$GITHUB_OUTPUT"
          echo "Jenkins build started with number: $BUILD_NUM"
          echo "### Jenkins Build Started :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Test: ${{ matrix.test }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build: #$BUILD_NUM" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${JENKINS_URL}/job/${{ env.JENKINS_JOB_NAME }}/${BUILD_NUM}" >> "$GITHUB_STEP_SUMMARY"

      - name: Poll Jenkins Build Status
        id: poll
        timeout-minutes: 180
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
          BUILD_NUM: ${{ steps.wait-start.outputs.build_number }}
          TEST_NAME: ${{ matrix.test }}
        run: |
          set -euo pipefail

          echo "Polling Jenkins build status..."

          POLL_INTERVAL=30  # seconds
          MAX_ATTEMPTS=360  # 3 hours (360 * 30s)
          ATTEMPT=0

          while [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; do
            STATUS=$(./github/scripts/jenkins_trigger.sh status \
              "$JENKINS_URL" "${{ env.JENKINS_JOB_NAME }}" "$BUILD_NUM" \
              --user "$JENKINS_USER" \
              --token "$JENKINS_TOKEN")

            echo "Attempt $((ATTEMPT+1))/$MAX_ATTEMPTS: Status = $STATUS"

            if [[ "$STATUS" != "BUILDING" && "$STATUS" != "null" ]]; then
              echo "Build completed with status: $STATUS"
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"

              if [[ "$STATUS" == "SUCCESS" ]]; then
                echo "Jenkins build succeeded"
                exit 0
              else
                echo "Jenkins build failed with status: $STATUS"
                # Note: We still check marker files below, as Jenkins may fail but test may have passed
                echo "status_failed=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi

            sleep $POLL_INTERVAL
            ((ATTEMPT++))
          done

          echo "Timeout waiting for build to complete after $((MAX_ATTEMPTS * POLL_INTERVAL))s"
          exit 1

      - name: Download Results from GCS
        if: always()
        id: download
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET_DEST }}
          BUILD_TAG: ${{ inputs.build-tag }}
          TEST_NAME: ${{ matrix.test }}
        run: |
          set -euo pipefail

          echo "Downloading test results from GCS..."

          # Make script executable
          chmod +x .github/workflows/support/scripts/gcs_download.sh

          # Create results directory
          RESULTS_DIR="./results/$TEST_NAME"
          mkdir -p "$RESULTS_DIR"

          # Download with marker file check (returns exit code based on pass/fail)
          if DEBUG=1 .github/workflows/support/scripts/gcs_download.sh \
              "$GCS_BUCKET" "$BUILD_TAG" "$TEST_NAME" "$RESULTS_DIR"; then
            echo "test_passed=true" >> "$GITHUB_OUTPUT"
            echo "Test result: PASSED"
          else
            DOWNLOAD_EXIT=$?
            if [[ $DOWNLOAD_EXIT -eq 1 ]]; then
              echo "test_passed=false" >> "$GITHUB_OUTPUT"
              echo "Test result: FAILED"
            else
              echo "test_passed=indeterminate" >> "$GITHUB_OUTPUT"
              echo "Test result: INDETERMINATE (no marker file)"
            fi
          fi

      - name: Check Test Result
        if: always()
        env:
          TEST_PASSED: ${{ steps.download.outputs.test_passed }}
          TEST_NAME: ${{ matrix.test }}
        run: |
          set -euo pipefail

          echo "### Test Result: $TEST_NAME" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$TEST_PASSED" == "true" ]]; then
            echo "✅ Test **PASSED**" >> "$GITHUB_STEP_SUMMARY"
            echo "Test $TEST_NAME: PASSED"
            exit 0
          elif [[ "$TEST_PASSED" == "false" ]]; then
            echo "❌ Test **FAILED**" >> "$GITHUB_STEP_SUMMARY"
            echo "Test $TEST_NAME: FAILED"
            exit 1
          else
            echo "⚠️ Test result **INDETERMINATE** (no marker file found)" >> "$GITHUB_STEP_SUMMARY"
            echo "Test $TEST_NAME: INDETERMINATE"
            exit 1
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test }}
          path: ./results/${{ matrix.test }}/
          retention-days: 30

  # Job 3: Generate Final Report
  report:
    needs: [initialize, run-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download All Test Results
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET_DEST }}
          BUILD_TAG: ${{ inputs.build-tag }}
        run: |
          set -euo pipefail

          echo "Downloading all test results for aggregation..."

          GCS_PATH="gs://${GCS_BUCKET}/citr/${BUILD_TAG}"
          LOCAL_DIR="./all-results"

          mkdir -p "$LOCAL_DIR"

          # Download all results
          if gsutil -m cp -r "${GCS_PATH}/*" "$LOCAL_DIR/" 2>/dev/null; then
            echo "Successfully downloaded all results"
          else
            echo "Warning: Some results may not be available"
          fi

          # List downloaded files
          echo "Downloaded files:"
          find "$LOCAL_DIR" -type f

      - name: Generate Summary Report
        run: |
          set -euo pipefail

          echo "# Nightly Test Results Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Build Tag**: ${{ inputs.build-tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Service Version**: ${{ inputs.version-service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Mirror Node Version**: ${{ inputs.version-mirrornode }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Count pass/fail markers
          PASSED=0
          FAILED=0
          TOTAL=0

          for test in ${{ needs.initialize.outputs.test_list }}; do
            ((TOTAL++))
            if [[ -f "./all-results/${test}.pass" ]]; then
              ((PASSED++))
              echo "- ✅ **${test}**: PASSED" >> "$GITHUB_STEP_SUMMARY"
            elif [[ -f "./all-results/${test}.fail" ]]; then
              ((FAILED++))
              echo "- ❌ **${test}**: FAILED" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ⚠️ **${test}**: NOT RUN" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Summary**: $PASSED passed, $FAILED failed, $TOTAL total" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**GCS Path**: gs://${{ secrets.GCS_BUCKET_DEST }}/citr/${{ inputs.build-tag }}/" >> "$GITHUB_STEP_SUMMARY"

  # Job 4: Notify on Failures
  notify-failures:
    needs: [initialize, run-tests, report]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Report Failure
        env:
          TEST_LIST: ${{ needs.initialize.outputs.test_list }}
          BUILD_TAG: ${{ inputs.build-tag }}
        run: |
          echo "### ❌ Test Suite Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "One or more tests failed. Check individual test results above." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Build Tag**: ${BUILD_TAG}" >> "$GITHUB_STEP_SUMMARY"

