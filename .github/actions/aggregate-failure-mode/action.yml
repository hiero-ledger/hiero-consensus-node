# SPDX-License-Identifier: Apache-2.0
name: Aggregate Failure Mode
description: Aggregates failure-mode outputs from multiple upstream jobs.

inputs:
  job-results:
    description: "Newline-separated job results (success|failure|cancelled|skipped), one per upstream job"
    required: true
  job-failure-modes:
    description: "Newline-separated failure-mode outputs (none|test|workflow), same order as job-results"
    required: true
  handle-cancelled:
    description: "If 'true', treat a cancelled job as a workflow failure"
    required: false
    default: "false"

outputs:
  failure-mode:
    description: "none | test | workflow"
    value: ${{ steps.aggregate.outputs.failure-mode }}

runs:
  using: composite
  steps:
    - name: Aggregate failure mode
      id: aggregate
      if: always()
      shell: bash
      env:
        JOB_RESULTS: ${{ inputs.job-results }}
        JOB_FAILURE_MODES: ${{ inputs.job-failure-modes }}
        HANDLE_CANCELLED: ${{ inputs.handle-cancelled }}
      run: |
        mapfile -t job_statuses      < <(echo "${JOB_RESULTS}"       | grep -v '^[[:space:]]*$')
        mapfile -t job_failure_modes < <(echo "${JOB_FAILURE_MODES}" | grep -v '^[[:space:]]*$')

        failure_mode="none"

        for i in "${!job_statuses[@]}"; do
          status="${job_statuses[$i]}"
          mode="${job_failure_modes[$i]}"
          if [[ "${status}" == "failure" ]]; then
            if [[ "${failure_mode}" == "none" ]]; then
              failure_mode="${mode}"
            elif [[ "${mode}" == "workflow" ]]; then
              failure_mode="workflow"
            fi
          elif [[ "${HANDLE_CANCELLED}" == "true" && "${status}" == "cancelled" ]]; then
            if [[ "${failure_mode}" != "workflow" ]]; then
              failure_mode="workflow"
            fi
          fi
        done

        echo "failure-mode=${failure_mode}" >> "${GITHUB_OUTPUT}"
